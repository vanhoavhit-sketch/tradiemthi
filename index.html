<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tra cứu trạm</title>
<style>
  body { font-family: Arial; text-align: center; }
  input { padding: 10px; width: 250px; }
  button { padding: 10px; }
  .box { margin-top: 20px; }
</style>
</head>
<body>

<h2>Tra cứu trạm theo mã</h2>

<input type="text" id="search" placeholder="Nhập mã trạm (VD: DLKP06)">
<button onclick="tim()">Tra cứu</button>

<div class="box" id="result"></div>

<script>
async function tim(){
  let key = document.getElementById("search").value.trim().toUpperCase();

  let res = await fetch("data.json");
  let data = await res.json();

  let found = data.find(x => x.site_id === key);

  if(found){
    document.getElementById("result").innerHTML = `
      <b>${found.ten_tram}</b><br><br>
      Mã trạm: ${found.site_id}<br>
      Ngày SD: ${found.ngay_sd}<br>
      Đơn vị: ${found.don_vi}<br>
      Trạng thái: ${found.canh_bao}
    `;
  } else {
    document.getElementById("result").innerHTML = "❌ Không tìm thấy!";
  }
}
</script>

</body>
</html>
