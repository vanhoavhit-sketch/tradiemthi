<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tra cứu trạm</title>
<style>
body {font-family: Arial; background:#eef3f7; padding:20px}
h1 {text-align:center; color:#0066cc}
.search-box {display:flex; gap:10px}
input {flex:1; padding:12px; font-size:16px; border-radius:8px; border:1px solid #ccc}
button {padding:12px; border:none; border-radius:8px; background:#0066cc; color:white}
.card {background:white; padding:15px; margin-top:15px; border-radius:12px}
.highlight {background:yellow}
</style>
</head>
<body>

<h1>TRA CỨU TRẠM</h1>

<div class="search-box">
<input id="search" placeholder="Nhập sitename...">
<button onclick="searchData()">Tìm</button>
<button onclick="resetData()">Xóa</button>
</div>

<div id="loading" style="display:none;">Đang tìm...</div>
<div id="result"></div>

<script>
let data = [];

fetch("datatram_clean.json")
.then(res => res.json())
.then(json => data = json);

function normalize(str){
    return str.toLowerCase()
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "");
}

function highlight(text, keyword){
    let idx = normalize(text).indexOf(keyword);
    if(idx === -1) return text;
    return text.substring(0,idx) + "<span class='highlight'>" +
           text.substring(idx, idx+keyword.length) +
           "</span>" + text.substring(idx+keyword.length);
}

function searchData(){
    let keyword = normalize(document.getElementById("search").value);
    let result = document.getElementById("result");
    let loading = document.getElementById("loading");

    result.innerHTML = "";
    loading.style.display = "block";

    setTimeout(()=>{
        let found = data.filter(item => {
            let val = item["sitename_cu"];
            return val && normalize(val).includes(keyword);
        });

        loading.style.display = "none";

        if(found.length === 0){
            result.innerHTML = "Không tìm thấy";
            return;
        }

        found.forEach(item=>{
            let html = "<div class='card'>";
            for(let k in item){
                html += "<div><b>"+k+":</b> "+highlight(item[k].toString(), keyword)+"</div>";
            }
            html += "</div>";
            result.innerHTML += html;
        });
    },300);
}

function resetData(){
    document.getElementById("search").value = "";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
